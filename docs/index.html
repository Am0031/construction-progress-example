<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/construction-progress-example/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>progress-map</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Decodes the path that 404.html re-encoded into the query string,
      // restoring the real URL via history.replaceState before React Router
      // reads it.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" crossorigin src="/construction-progress-example/assets/index-BCbXj-oz.js"></script>
    <link rel="stylesheet" crossorigin href="/construction-progress-example/assets/index-Bc64V5b5.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
