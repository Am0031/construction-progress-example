<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>progress-map</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this file for any path it doesn't recognize as a
      // real file (i.e. every client-side route). It re-encodes the intended
      // path into a query string and redirects to index.html, which decodes
      // it back before the app mounts — so a hard refresh or direct link to
      // a route like /programme lands on the right page instead of a 404.
      var pathSegmentsToKeep = 1; // keep the "/construction-progress-example" repo segment

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
